name: Publish JavaScript SDK

on:
  push:
    tags:
      - 'js-v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0)'
        required: true

jobs:
  publish-npm:
    name: Publish to NPM
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Install dependencies
        working-directory: ./sdk/javascript
        run: npm ci
      
      - name: Run tests
        working-directory: ./sdk/javascript
        run: npm test
      
      - name: Build
        working-directory: ./sdk/javascript
        run: npm run build
      
      - name: Update version (if manual trigger)
        if: github.event_name == 'workflow_dispatch'
        working-directory: ./sdk/javascript
        run: npm version ${{ github.event.inputs.version }} --no-git-tag-version
      
      - name: Publish to NPM
        working-directory: ./sdk/javascript
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      
      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: JavaScript SDK ${{ github.ref }}
          body: |
            ## JavaScript/TypeScript SDK Release
            
            Published to NPM: [@agentguard/sdk](https://www.npmjs.com/package/@agentguard/sdk)
            
            Install with:
            ```bash
            npm install @agentguard/sdk
            ```
            
            See [documentation](https://docs.agentguard.dev/sdk/javascript) for usage.
          draft: false
          prerelease: false
