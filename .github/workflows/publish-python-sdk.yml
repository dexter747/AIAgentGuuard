name: Publish Python SDK

on:
  push:
    tags:
      - 'py-v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0)'
        required: true

jobs:
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        working-directory: ./sdk/python
        run: |
          python -m pip install --upgrade pip
          pip install build twine pytest
          pip install -r requirements.txt
      
      - name: Run tests
        working-directory: ./sdk/python
        run: pytest tests/
      
      - name: Update version (if manual trigger)
        if: github.event_name == 'workflow_dispatch'
        working-directory: ./sdk/python
        run: |
          echo "__version__ = '${{ github.event.inputs.version }}'" > agentguard/__version__.py
      
      - name: Build package
        working-directory: ./sdk/python
        run: python -m build
      
      - name: Check distribution
        working-directory: ./sdk/python
        run: twine check dist/*
      
      - name: Publish to PyPI
        working-directory: ./sdk/python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/*
      
      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Python SDK ${{ github.ref }}
          body: |
            ## Python SDK Release
            
            Published to PyPI: [agentguard](https://pypi.org/project/agentguard/)
            
            Install with:
            ```bash
            pip install agentguard
            ```
            
            See [documentation](https://docs.agentguard.dev/sdk/python) for usage.
          draft: false
          prerelease: false
